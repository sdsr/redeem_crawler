<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>관리자 로그인 - Redeem Note</title>
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='icons/redeem-note.png') }}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-main: #f6f7fb;
            --bg-panel: #ffffff;
            --text-primary: #111827;
            --text-secondary: #4b5563;
            --text-muted: #6b7280;
            --border: #e5e7eb;
            --accent: #6366f1;
            --accent-hover: #4f46e5;
            --red: #dc2626;
            --red-bg: #fef2f2;
            --shadow: 0 18px 50px rgba(17, 24, 39, 0.12);
        }

        :root[data-theme="dark"] {
            --bg-main: #0f172a;
            --bg-panel: #111827;
            --text-primary: #f8fafc;
            --text-secondary: #cbd5e1;
            --text-muted: #94a3b8;
            --border: #263244;
            --accent: #8b93ff;
            --accent-hover: #a5b4fc;
            --red: #fca5a5;
            --red-bg: rgba(248, 113, 113, 0.14);
            --shadow: 0 22px 60px rgba(0, 0, 0, 0.36);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 1.5rem;
            background: var(--bg-main);
            color: var(--text-primary);
            font-family: 'Noto Sans KR', -apple-system, BlinkMacSystemFont, sans-serif;
        }

        .login-panel {
            width: min(100%, 24rem);
            padding: 2rem;
            background: var(--bg-panel);
            border: 1px solid var(--border);
            border-radius: 8px;
            box-shadow: var(--shadow);
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin-bottom: 1.5rem;
            font-weight: 700;
            font-size: 1.25rem;
        }

        .brand-mark {
            width: 2.25rem;
            height: 2.25rem;
            border-radius: 8px;
            overflow: hidden;
            flex-shrink: 0;
            box-shadow: 0 6px 18px rgba(99, 102, 241, 0.24);
        }

        .brand-mark img {
            width: 100%;
            height: 100%;
            display: block;
        }

        h1 {
            margin-bottom: 0.5rem;
            font-size: 1.35rem;
            line-height: 1.3;
        }

        .desc {
            margin-bottom: 1.5rem;
            color: var(--text-muted);
            font-size: 0.9rem;
            line-height: 1.6;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--text-secondary);
            font-size: 0.875rem;
            font-weight: 600;
        }

        input {
            width: 100%;
            height: 2.75rem;
            padding: 0 0.875rem;
            background: var(--bg-main);
            color: var(--text-primary);
            border: 1px solid var(--border);
            border-radius: 7px;
            font: inherit;
            outline: none;
        }

        input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.14);
        }

        .error {
            margin-bottom: 1rem;
            padding: 0.75rem 0.875rem;
            background: var(--red-bg);
            color: var(--red);
            border: 1px solid rgba(220, 38, 38, 0.2);
            border-radius: 7px;
            font-size: 0.875rem;
            line-height: 1.5;
        }

        .actions {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 1rem;
            margin-top: 1.25rem;
        }

        a {
            color: var(--text-muted);
            font-size: 0.875rem;
            text-decoration: none;
        }

        a:hover {
            color: var(--accent);
        }

        button {
            height: 2.5rem;
            padding: 0 1.1rem;
            background: var(--accent);
            color: white;
            border: 0;
            border-radius: 7px;
            font: inherit;
            font-weight: 700;
            cursor: pointer;
        }

        button:hover {
            background: var(--accent-hover);
        }

        button:disabled {
            cursor: not-allowed;
            opacity: 0.55;
        }
    </style>
</head>
<body>
    <main class="login-panel">
        <div class="brand">
            <div class="brand-mark">
                <img src="{{ url_for('static', filename='icons/redeem-note.png') }}" alt="" aria-hidden="true">
            </div>
            <span>Redeem Note</span>
        </div>

        <h1>관리자 로그인</h1>
        <p class="desc">관리자 기능은 서버에 설정된 비밀번호로만 사용할 수 있습니다.</p>

        {% if error %}
        <div class="error">{{ error }}</div>
        {% elif not is_configured %}
        <div class="error">서버에 관리자 비밀번호가 아직 설정되어 있지 않습니다.</div>
        {% endif %}

        <form method="post" action="{{ url_for('admin_login') }}">
            <label for="password">비밀번호</label>
            <input id="password" name="password" type="password" autocomplete="current-password" autofocus required>

            <div class="actions">
                <a href="{{ url_for('index') }}">돌아가기</a>
                <button type="submit" {% if not is_configured %}disabled{% endif %}>로그인</button>
            </div>
        </form>
    </main>

    <script>
        const theme = localStorage.getItem('redeem-theme') || 'light';
        document.documentElement.dataset.theme = theme;
    </script>
</body>
</html>
